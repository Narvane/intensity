# Produção: app (GHCR) + Postgres
# Use: docker compose -f docker-compose.prod.yml up -d

services:
  app:
    image: ghcr.io/narvane/narvane-api:latest
    container_name: narvane-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PROFILE: prod
      DS_URL: postgres
      DS_PORT: "5432"
      DS_DATABASE: narvane
      DS_USER: postgres
      DS_PASS: ${DS_PASS:-postgres}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: narvane-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DS_PASS:-postgres}
      POSTGRES_DB: narvane
    volumes:
      - narvane_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  narvane_pgdata:
