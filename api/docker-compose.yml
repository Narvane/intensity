services:
  postgres:
    image: postgres:16-alpine
    container_name: intensity-postgres
    environment:
      POSTGRES_DB: intensity
      POSTGRES_USER: intensity
      POSTGRES_PASSWORD: intensity
    ports:
      - "5432:5432"
    volumes:
      - intensity_postgres_data:/var/lib/postgresql/data
      - ./docker/init-demo-db.sh:/docker-entrypoint-initdb.d/01-init-demo-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intensity -d intensity"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  intensity_postgres_data:
