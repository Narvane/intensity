spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/intensity}
    username: ${SPRING_DATASOURCE_USERNAME:intensity}
    password: ${SPRING_DATASOURCE_PASSWORD:intensity}
  jpa:
    show-sql: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoint:
    health:
      show-details: never

intensity:
  jwt:
    secret: ${INTENSITY_JWT_SECRET}
    expiration-seconds: ${INTENSITY_JWT_EXPIRATION_SECONDS:86400}
    experience-box-expiration-seconds: ${INTENSITY_JWT_EXPERIENCE_BOX_EXPIRATION_SECONDS:14400}
  registration:
    allowlist-enabled: ${INTENSITY_REGISTRATION_ALLOWLIST_ENABLED:false}
  email:
    resend-api-key: ${INTENSITY_RESEND_API_KEY:}
    from: ${INTENSITY_RESEND_FROM}
    app-base-url: ${INTENSITY_APP_BASE_URL}
    password-reset-expiration-seconds: ${INTENSITY_PASSWORD_RESET_EXPIRATION_SECONDS:3600}
  cors:
    allowed-origin-patterns:
      # Web app (production)
      - https://app.narvane.com.br
      - https://*.narvane.com.br
      # Capacitor WebView origins (scheme depends on STORE_BUILD / androidScheme)
      - http://localhost
      - http://localhost:*
      - https://localhost
      - https://localhost:*
      - capacitor://localhost
      - capacitor://localhost:*
      - ionic://localhost
      - ionic://localhost:*
      - http://android.localhost
      - https://android.localhost
