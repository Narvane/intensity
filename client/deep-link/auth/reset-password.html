<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Intensity — Reset password</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f3ee;
        --surface: #fffdf9;
        --text: #2b2118;
        --muted: #7a6a5c;
        --coral: #ff6b3d;
        --border: #e7ddd2;
        --danger: #c0392b;
        --ok: #1f7a4d;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: radial-gradient(circle at top, #fff7ef, var(--bg));
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 1.5rem;
      }
      main {
        width: min(100%, 26rem);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: 1.5rem;
        box-shadow: 0 12px 40px rgba(43, 33, 24, 0.08);
      }
      h1 {
        margin: 0 0 0.35rem;
        font-size: 1.5rem;
      }
      p {
        margin: 0 0 1rem;
        color: var(--muted);
        line-height: 1.45;
      }
      label {
        display: grid;
        gap: 0.35rem;
        margin-bottom: 0.85rem;
        font-size: 0.92rem;
        color: var(--muted);
      }
      input {
        min-height: 2.75rem;
        border-radius: 0.65rem;
        border: 1px solid var(--border);
        padding: 0.65rem 0.85rem;
        font: inherit;
        color: var(--text);
        background: #fff;
      }
      button {
        width: 100%;
        min-height: 2.85rem;
        border: none;
        border-radius: 0.75rem;
        background: var(--coral);
        color: #fff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .msg {
        margin-top: 0.85rem;
        line-height: 1.4;
      }
      .msg.error {
        color: var(--danger);
      }
      .msg.ok {
        color: var(--ok);
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Set a new password</h1>
      <p id="subtitle">Choose a new password for your Intensity account.</p>
      <form id="form">
        <label>
          New password
          <input id="password" type="password" autocomplete="new-password" minlength="8" maxlength="128" required />
        </label>
        <label>
          Confirm password
          <input id="confirm" type="password" autocomplete="new-password" minlength="8" maxlength="128" required />
        </label>
        <button id="submit" type="submit">Update password</button>
      </form>
      <p id="message" class="msg" hidden></p>
    </main>
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const token = (params.get("t") || "").trim();
        const form = document.getElementById("form");
        const message = document.getElementById("message");
        const submit = document.getElementById("submit");
        const subtitle = document.getElementById("subtitle");

        function apiBaseUrl() {
          const host = window.location.hostname;
          if (host.startsWith("app.")) {
            return window.location.origin.replace("://app.", "://api.");
          }
          if (host.startsWith("demo-intensity.")) {
            return window.location.origin.replace("://demo-intensity.", "://demo-intensity-api.");
          }
          return window.location.origin;
        }

        function show(text, kind) {
          message.hidden = false;
          message.className = "msg " + kind;
          message.textContent = text;
        }

        if (!token) {
          form.hidden = true;
          subtitle.textContent = "This reset link is missing a token.";
          show("Open the link from your email, or request a new password reset in the app.", "error");
          return;
        }

        form.addEventListener("submit", async function (event) {
          event.preventDefault();
          const password = document.getElementById("password").value;
          const confirm = document.getElementById("confirm").value;
          if (password.length < 8 || password.length > 128) {
            show("Password must be between 8 and 128 characters.", "error");
            return;
          }
          if (password !== confirm) {
            show("Passwords do not match.", "error");
            return;
          }

          submit.disabled = true;
          show("Updating…", "ok");
          try {
            const response = await fetch(apiBaseUrl() + "/v1/auth/reset-password", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ token: token, password: password }),
            });
            if (response.status === 204) {
              form.hidden = true;
              subtitle.textContent = "Password updated.";
              show("You can open the Intensity app and sign in with your new password.", "ok");
              return;
            }
            let payload = { message: "Could not update the password." };
            try {
              payload = await response.json();
            } catch (_) {}
            show(payload.message || "Could not update the password.", "error");
          } catch (_) {
            show("Could not reach the server. Check your connection and try again.", "error");
          } finally {
            submit.disabled = false;
          }
        });
      })();
    </script>
  </body>
</html>
