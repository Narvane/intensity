    <style>
      :root {
        color-scheme: light;
        --bg: #f7f3ee;
        --surface: #fffdf9;
        --text: #2b2118;
        --muted: #7a6a5c;
        --coral: #ff6b3d;
        --border: #e7ddd2;
        --link: #7b5cf6;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: radial-gradient(circle at top, #fff7ef, var(--bg));
        color: var(--text);
        line-height: 1.55;
      }
      header {
        position: sticky;
        top: 0;
        z-index: 1;
        backdrop-filter: blur(10px);
        background: rgba(255, 253, 249, 0.92);
        border-bottom: 1px solid var(--border);
      }
      .header-inner,
      main {
        width: min(100%, 42rem);
        margin: 0 auto;
        padding: 1rem 1.25rem 2.5rem;
      }
      .header-inner {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding-bottom: 1rem;
      }
      .brand {
        font-weight: 800;
        font-size: 1.1rem;
      }
      .lang-switch {
        display: flex;
        gap: 0.35rem;
        flex-wrap: wrap;
      }
      .lang-switch button {
        border: 1px solid var(--border);
        background: #fff;
        color: var(--muted);
        border-radius: 999px;
        padding: 0.35rem 0.75rem;
        font: inherit;
        font-size: 0.85rem;
        cursor: pointer;
      }
      .lang-switch button[aria-pressed="true"] {
        background: var(--coral);
        border-color: var(--coral);
        color: #fff;
        font-weight: 700;
      }
      h1 {
        margin: 0 0 0.35rem;
        font-size: clamp(1.6rem, 4vw, 2rem);
        line-height: 1.2;
      }
      .updated {
        margin: 0 0 1.5rem;
        color: var(--muted);
        font-size: 0.95rem;
      }
      article section {
        margin-bottom: 1.35rem;
      }
      h2 {
        margin: 0 0 0.45rem;
        font-size: 1.08rem;
      }
      p,
      li {
        margin: 0 0 0.65rem;
        color: var(--text);
      }
      ul {
        margin: 0 0 0.65rem;
        padding-left: 1.25rem;
      }
      a {
        color: var(--link);
      }
      .contact {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 0.85rem;
        padding: 1rem 1.1rem;
      }
    </style>

        function normalizeLocale(value) {
          if (!value) return "en";
          const lower = String(value).toLowerCase();
          if (lower.startsWith("pt")) return "pt-BR";
          if (lower.startsWith("it")) return "it";
          return "en";
        }

        function detectLocale() {
          const params = new URLSearchParams(window.location.search);
          const requested = params.get("lang") || params.get("locale");
          if (requested) {
            return normalizeLocale(requested);
          }
          const candidates = navigator.languages?.length
            ? navigator.languages
            : [navigator.language];
          for (const candidate of candidates) {
            const normalized = normalizeLocale(candidate);
            if (copy[normalized]) return normalized;
          }
          return "en";
        }

        function formatDate(locale) {
          try {
            return new Intl.DateTimeFormat(locale, {
              year: "numeric",
              month: "long",
              day: "numeric",
            }).format(new Date(LAST_UPDATED + "T12:00:00"));
          } catch (_) {
            return LAST_UPDATED;
          }
        }

        function render(locale) {
          const page = copy[locale] || copy.en;
          document.documentElement.lang = page.htmlLang;
          document.title = "Intensity — " + page.title;

          const article = document.getElementById("content");
          article.innerHTML = "";

          const h1 = document.createElement("h1");
          h1.textContent = page.title;
          article.appendChild(h1);

          const updated = document.createElement("p");
          updated.className = "updated";
          updated.textContent = page.updated.replace("{{date}}", formatDate(locale));
          article.appendChild(updated);

          for (const section of page.sections) {
            const block = document.createElement("section");
            if (section.contact) block.className = "contact";

            const h2 = document.createElement("h2");
            h2.textContent = section.heading;
            block.appendChild(h2);

            for (const paragraph of section.paragraphs || []) {
              const p = document.createElement("p");
              p.innerHTML = paragraph;
              block.appendChild(p);
            }

            if (section.list) {
              const ul = document.createElement("ul");
              for (const item of section.list) {
                const li = document.createElement("li");
                li.textContent = item;
                ul.appendChild(li);
              }
              block.appendChild(ul);
            }

            for (const paragraph of section.afterList || []) {
              const p = document.createElement("p");
              p.textContent = paragraph;
              block.appendChild(p);
            }

            article.appendChild(block);
          }

          document.querySelectorAll(".lang-switch button").forEach(function (button) {
            const active = button.getAttribute("data-locale") === locale;
            button.setAttribute("aria-pressed", active ? "true" : "false");
          });
        }

        let currentLocale = detectLocale();
        render(currentLocale);

        document.querySelectorAll(".lang-switch button").forEach(function (button) {
          button.addEventListener("click", function () {
            currentLocale = button.getAttribute("data-locale");
            const url = new URL(window.location.href);
            url.searchParams.set("lang", currentLocale);
            window.history.replaceState({}, "", url);
            render(currentLocale);
          });
        });
      })();
    </script>
  </body>
</html>
