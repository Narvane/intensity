# Public demo stack — isolated Postgres + API (profile demo) + static web.
# Shares TLS with production via network `intensity` (Caddy in docker-compose.prod.yml).
# Usage: cp .env.demo.example .env.demo && ./deploy-demo.sh
name: intensity-demo

services:
  postgres:
    image: postgres:16-alpine
    container_name: intensity-demo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-intensity_demo}
      POSTGRES_USER: ${POSTGRES_USER:-intensity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.demo}
    volumes:
      - intensity_demo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-intensity} -d ${POSTGRES_DB:-intensity_demo}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - demo

  api:
    image: ${API_IMAGE:?Set API_IMAGE in .env.demo}
    container_name: intensity-demo-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: demo
      # Use container_name — NOT service alias "postgres". The API also joins
      # the production network `intensity`, where prod's service is also "postgres".
      SPRING_DATASOURCE_URL: jdbc:postgresql://intensity-demo-postgres:5432/${POSTGRES_DB:-intensity_demo}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-intensity}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.demo}
      INTENSITY_JWT_SECRET: ${INTENSITY_JWT_SECRET:?Set INTENSITY_JWT_SECRET in .env.demo}
    networks:
      - demo
      - intensity

  web:
    image: nginx:1.27-alpine
    container_name: intensity-demo-web
    restart: unless-stopped
    volumes:
      - ./demo-web:/usr/share/nginx/html:ro
      - ./demo-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - intensity

networks:
  demo:
    name: intensity-demo
    driver: bridge
  intensity:
    external: true
    name: intensity

volumes:
  intensity_demo_postgres_data:
