openapi: 3.1.0
info:
  title: Intensity API
  version: 1.0.0
  license:
    name: Proprietary
  description: |
    REST API v1 for Intensity — groups, boxes, experiences, and invites.
    Canonical product spec: @ref:docs-en (`docs/en/`).

    JWT sessions (configured via `intensity.jwt.*` in the API):
    - Experiences tokens default to 2_592_000 seconds (30 days).
    - Experience Box tokens default to 14_400 seconds (4 hours).
servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://api.intensity.example
    description: Production

tags:
  - name: Auth
    description: Authentication for Experiences and Experience Box modes
  - name: Participants
    description: Participant registration
  - name: Groups
    description: Group membership and listing
  - name: Invites
    description: Invite create, validate, accept, revoke
  - name: Boxes
    description: Box list, create, delete
  - name: Experiences
    description: Experience CRUD in boxes

security:
  - bearerAuth: []

paths:
  /v1/auth/login:
    post:
      tags: [Auth]
      summary: Experiences mode login
      operationId: loginExperiences
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/auth/group:
    post:
      tags: [Auth]
      summary: Experience Box joint login
      operationId: loginExperienceBox
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JointLoginRequest'
      responses:
        '200':
          description: Group session opened or created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JointAuthSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/participants:
    post:
      tags: [Participants]
      summary: Register participant (optional email allowlist)
      operationId: registerParticipant
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterParticipantRequest'
      responses:
        '201':
          description: Participant created with initial session token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterParticipantResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/groups:
    get:
      tags: [Groups]
      summary: List groups for authenticated participant
      operationId: listGroups
      responses:
        '200':
          description: Groups where caller is a member
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Group'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Groups]
      summary: Create a solo group for the authenticated participant
      operationId: createGroup
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupRequest'
      responses:
        '201':
          description: Group created with caller as sole member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '400':
          $ref: '#/components/responses/ValidationError'

  /v1/groups/{groupId}:
    parameters:
      - $ref: '#/components/parameters/GroupId'
    patch:
      tags: [Groups]
      summary: Update group display name and/or accent color
      operationId: updateGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGroupRequest'
      responses:
        '200':
          description: Group updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/groups/{groupId}/members:
    parameters:
      - $ref: '#/components/parameters/GroupId'
    delete:
      tags: [Groups]
      summary: Leave group (self)
      description: |
        Removes the authenticated Experiences participant from the group.
        Member lists are returned on `Group` and auth responses — there is no
        `GET` handler on this path.
      operationId: leaveGroup
      responses:
        '204':
          description: Left group or group deleted when last member
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/groups/{groupId}/invites:
    parameters:
      - $ref: '#/components/parameters/GroupId'
    get:
      tags: [Invites]
      summary: List active invites for a group
      operationId: listGroupInvites
      responses:
        '200':
          description: Active invites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Invite'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Invites]
      summary: Create invite
      operationId: createInvite
      responses:
        '201':
          description: Invite created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invite'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/invites/validate:
    get:
      tags: [Invites]
      summary: Validate invite by code or link token
      operationId: validateInvite
      security: []
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
            pattern: '^[A-HJ-NP-Z2-9]{6}$'
          description: 6-character Crockford code
        - name: t
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Link token from deep link
      responses:
        '200':
          description: Invite preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitePreview'
        '404':
          $ref: '#/components/responses/NotFound'
        '410':
          $ref: '#/components/responses/Gone'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/invites/{inviteId}/accept:
    parameters:
      - $ref: '#/components/parameters/InviteId'
    post:
      tags: [Invites]
      summary: Accept invite
      operationId: acceptInvite
      responses:
        '200':
          description: Membership confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptInviteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '410':
          $ref: '#/components/responses/Gone'

  /v1/invites/{inviteId}:
    parameters:
      - $ref: '#/components/parameters/InviteId'
    delete:
      tags: [Invites]
      summary: Revoke invite
      operationId: revokeInvite
      responses:
        '204':
          description: Invite revoked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '410':
          $ref: '#/components/responses/Gone'

  /v1/groups/{groupId}/boxes:
    parameters:
      - $ref: '#/components/parameters/GroupId'
    get:
      tags: [Boxes]
      summary: List boxes in a group
      description: |
        In Experience Box sessions, boxes with `requireAllParticipants: true` are
        omitted unless every group member is present in the current joint session.
        Experiences-mode listing is not filtered by that flag.
      operationId: listGroupBoxes
      responses:
        '200':
          description: Boxes visible for the current session
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Box'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/boxes:
    post:
      tags: [Boxes]
      summary: Create box (Experience Box session or group member)
      operationId: createBox
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBoxRequest'
      responses:
        '201':
          description: Box created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Box'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/boxes/{boxId}:
    parameters:
      - $ref: '#/components/parameters/BoxId'
    patch:
      tags: [Boxes]
      summary: Update box name and presence requirement (Experience Box session)
      operationId: updateBox
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBoxRequest'
      responses:
        '200':
          description: Box updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Box'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Boxes]
      summary: Delete box and cascade experiences
      operationId: deleteBox
      responses:
        '204':
          description: Box deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/boxes/{boxId}/experiences:
    parameters:
      - $ref: '#/components/parameters/BoxId'
    get:
      tags: [Experiences]
      summary: List experiences in box
      operationId: listBoxExperiences
      responses:
        '200':
          description: Experiences visible per visibility rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Experience'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Experiences]
      summary: Create experience in box
      operationId: createExperience
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExperienceRequest'
      responses:
        '201':
          description: Experience created with integrity seal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Experience'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/boxes/{boxId}/experiences/batch:
    parameters:
      - $ref: '#/components/parameters/BoxId'
    post:
      tags: [Experiences]
      summary: Create multiple experiences at once (branching)
      operationId: createExperiencesBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExperiencesBatchRequest'
      responses:
        '201':
          description: Experiences created with integrity seals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Experience'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/experiences/{experienceId}:
    parameters:
      - $ref: '#/components/parameters/ExperienceId'
    put:
      tags: [Experiences]
      summary: Update experience (author only)
      operationId: updateExperience
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExperienceRequest'
      responses:
        '200':
          description: Experience updated; seal recalculated if description changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Experience'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Experiences]
      summary: Delete experience (author only)
      operationId: deleteExperience
      responses:
        '204':
          description: Experience deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    GroupId:
      name: groupId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BoxId:
      name: boxId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ExperienceId:
      name: experienceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    InviteId:
      name: inviteId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Invalid or expired token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Not allowed for current participant or session
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Business conflict (e.g. joint login spans different groups)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Gone:
      description: Invite expired or revoked
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ValidationError:
      description: Validation failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: GROUP_MEMBERSHIP_CONFLICT
        message:
          type: string
          example: Credentials belong to different groups.

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8

    JointLoginRequest:
      type: object
      properties:
        credentials:
          type: array
          items:
            $ref: '#/components/schemas/LoginRequest'
          default: []
        reuseSessionToken:
          type: string
          description: Optional Experiences session token to authenticate the first participant without re-entering credentials.
        targetGroupId:
          type: string
          format: uuid
          description: |
            When set, the joint session is bound exclusively to this group.
            Compatible/exact group resolution and new-group creation are skipped.
        requireAllMembers:
          type: boolean
          default: false
          description: |
            When true with targetGroupId, every group member must authenticate.
            When false, a non-empty subset of the target group's members may open the session.

    AuthSession:
      type: object
      required: [token, participantId, displayName, accessMode]
      properties:
        token:
          type: string
        participantId:
          type: string
          format: uuid
        displayName:
          type: string
        accessMode:
          type: string
          enum: [EXPERIENCES]

    JointAuthSession:
      type: object
      required: [token, groupId, groupIds, members, accessMode]
      properties:
        token:
          type: string
        groupId:
          type: string
          format: uuid
        groupIds:
          type: array
          items:
            type: string
            format: uuid
        members:
          type: array
          items:
            $ref: '#/components/schemas/GroupMember'
        accessMode:
          type: string
          enum: [EXPERIENCE_BOX]

    RegisterParticipantRequest:
      type: object
      required: [displayName, email, password]
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 80
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8

    RegisterParticipantResponse:
      type: object
      required: [id, displayName, email, token]
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        email:
          type: string
          format: email
        token:
          type: string

    Participant:
      type: object
      required: [id, displayName, email]
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        email:
          type: string
          format: email

    Group:
      type: object
      required: [id, name, color, memberCount, createdAt, members]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        color:
          type: string
          enum: [coral, teal, purple, yellow]
        memberCount:
          type: integer
          minimum: 1
        createdAt:
          type: string
          format: date-time
        members:
          type: array
          items:
            $ref: '#/components/schemas/GroupMember'

    GroupMember:
      type: object
      required: [participantId, displayName]
      properties:
        participantId:
          type: string
          format: uuid
        displayName:
          type: string
        email:
          type: string
          format: email
          description: Present for authenticated group members; omitted on public invite previews.

    BoxType:
      type: string
      enum:
        - SAIDAS_COM_AMIGOS
        - SAIDAS_EM_CASAL
        - VIAGENS_EM_CASAL
        - INTIMO_EM_CASAL
        - VIAGENS_COM_AMIGOS
        - EXPERIENCIAS_COM_AMIGOS
        - SAIR_DA_ROTINA
        - PRIMEIRAS_VEZES
        - DESCONFORTO_LEVE
        - MOMENTOS_DE_CONEXAO
        - EXPERIENCIAS_DIFERENTES
      default: SAIDAS_COM_AMIGOS

    Box:
      type: object
      required: [id, groupId, name, type, requireAllParticipants, createdAt]
      properties:
        id:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 80
        type:
          $ref: '#/components/schemas/BoxType'
        requireAllParticipants:
          type: boolean
          default: false
          description: |
            When true, Experience Box list endpoints hide the box unless all
            group members are authenticated in the current joint session.
        createdAt:
          type: string
          format: date-time
        experienceCount:
          type: integer
          minimum: 0
        myExperienceCount:
          type: integer
          minimum: 0
          description: |
            Number of experiences authored by the current session participant
            in this box.

    CreateGroupRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 120
          description: Optional display name; empty/omitted uses member-preview fallback in UI
        color:
          type: string
          enum: [coral, teal, purple, yellow]
          default: coral

    UpdateGroupRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 120
        color:
          type: string
          enum: [coral, teal, purple, yellow]

    CreateBoxRequest:
      type: object
      required: [groupId, name]
      properties:
        groupId:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 80
        type:
          $ref: '#/components/schemas/BoxType'
        requireAllParticipants:
          type: boolean
          default: false
          description: Persist flag; filters Experience Box listing when true

    UpdateBoxRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        requireAllParticipants:
          type: boolean
          default: false
          description: When true, box is hidden unless all group members are in the joint session.

    ExperienceParameters:
      type: object
      required: [effort, unpredictability, novelty]
      properties:
        effort:
          type: integer
          minimum: 1
          maximum: 5
        unpredictability:
          type: integer
          minimum: 1
          maximum: 5
        novelty:
          type: integer
          minimum: 1
          maximum: 5

    ExperienceType:
      type: string
      description: Experience category shown on the draw card cover. Defaults to none.
      enum:
        - none
        - explore
        - randomness
        - exposure
        - constraints
        - overcoming
        - creativity
        - contrast
        - connection
        - contemplation
        - narrative
      default: none

    Experience:
      type: object
      required:
        - id
        - boxId
        - authorId
        - intensity
        - parameters
        - seal
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        boxId:
          type: string
          format: uuid
        authorId:
          type: string
          format: uuid
        authorDisplayName:
          type: string
        description:
          type: string
          maxLength: 1000
          description: Full text visible to author or after reveal
        reflection:
          type: string
          maxLength: 2000
        intensity:
          type: integer
          minimum: 1
          maximum: 5
        parameters:
          $ref: '#/components/schemas/ExperienceParameters'
        type:
          $ref: '#/components/schemas/ExperienceType'
        seal:
          type: string
          description: Integrity seal derived from description (UI term Seal, not hash)
        summaryOnly:
          type: boolean
          description: When true, description and reflection are omitted for non-authors
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateExperienceRequest:
      type: object
      required: [description, intensity, parameters]
      properties:
        description:
          type: string
          minLength: 1
          maxLength: 1000
        reflection:
          type: string
          maxLength: 2000
          description: Optional — "Why is this experience interesting?"
        intensity:
          type: integer
          minimum: 1
          maximum: 5
        parameters:
          $ref: '#/components/schemas/ExperienceParameters'
        type:
          $ref: '#/components/schemas/ExperienceType'

    CreateExperiencesBatchRequest:
      type: object
      required: [experiences]
      properties:
        experiences:
          type: array
          minItems: 1
          maxItems: 5
          items:
            $ref: '#/components/schemas/CreateExperienceRequest'

    UpdateExperienceRequest:
      allOf:
        - $ref: '#/components/schemas/CreateExperienceRequest'

    InviteStatus:
      type: string
      enum: [ACTIVE, ACCEPTED, REVOKED, EXPIRED]

    Invite:
      type: object
      required: [id, groupId, code, linkToken, expiresAt, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
        code:
          type: string
          pattern: '^[A-HJ-NP-Z2-9]{6}$'
        linkToken:
          type: string
          format: uuid
        expiresAt:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/InviteStatus'
        createdAt:
          type: string
          format: date-time

